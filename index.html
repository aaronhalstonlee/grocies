<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <meta name="theme-color" content="#2d6a4f">
    <title>Dinner Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hdr">
    <h1>🍽 Dinner Planner</h1>
    <div class="hdr-sub" id="week-lbl"></div>
</div>

<div id="tab-plan" class="tab on content">
    <div class="rules" id="rules-bar"></div>
    <div class="row2" style="margin-bottom:13px">
        <button class="btn btn-o" onclick="autoGen()">🎲 Auto-Generate</button>
        <button class="btn btn-s" onclick="genList()">🛒 Make List</button>
    </div>
    <div class="slbl">This Week</div>
    <div class="card" id="week-grid"></div>
</div>

<div id="tab-meals" class="tab content">
    <div class="filters">
        <button class="pill on" onclick="setFilter('all',this)">All</button>
        <button class="pill" onclick="setFilter('vegetarian',this)">🥦 Vegetarian</button>
        <button class="pill" onclick="setFilter('pre-prepared',this)">🧊 Pre-made</button>
        <button class="pill" onclick="setFilter('high-sodium',this)">🧂 High Sodium</button>
        <button class="pill" onclick="setFilter('other',this)">🍴 Free Pick</button>
    </div>
    <div class="card" id="meals-list"></div>
    <div style="margin-top:12px">
        <button class="btn btn-s" onclick="openImport()">📋 Import from Google Sheets</button>
    </div>
</div>

<div id="tab-shop" class="tab content">
    <div class="shop-hdr">
        <div class="slbl" style="margin:0">Grocery List</div>
        <button class="btn btn-s" style="width:auto;padding:6px 11px;font-size:.75rem" onclick="clearCk()">Clear checked</button>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div id="shop-list"></div>
</div>

<nav class="bnav">
    <button class="nb on" onclick="swTab('plan',this)"><span>🗓</span><span>Plan</span></button>
    <button class="nb" onclick="swTab('meals',this)"><span>🍽</span><span>Meals</span></button>
    <button class="nb" onclick="<span>🛒</span><span>Shop</span></button>
</nav>

<button class="fab" id="fab" onclick="openAdd()">+</button>
<div class="toast" id="toast"></div>

<div class="ov h" id="ov-assign">
    <div class="modal">
        <div class="modal-hnd"></div>
        <div class="mhdr"><h2 id="assign-ttl">Choose a meal</h2><button class="mcl" onclick="closeModal('ov-assign')">×</button></div>
        <div id="assign-list"></div>
        <div style="margin-top:11px"><button class="btn btn-d" onclick="clearDay()">🗑 Remove meal</button></div>
    </div>
</div>

<div class="ov h" id="ov-meal">
    <div class="modal">
        <div class="modal-hnd"></div>
        <div class="mhdr"><h2 id="meal-ttl">Add Meal</h2><button class="mcl" onclick="closeModal('ov-meal')">×</button></div>
        <div class="fg"><label>Meal Name</label><input type="text" id="m-name" placeholder="e.g. Pasta"></div>
        <div class="fg">
            <label>Rule Slot</label>
            <div class="prim-opts">
                <button class="popt" id="po-v" onclick="setPrim('vegetarian')">🥦 Veg</button>
                <button class="popt" id="po-p" onclick="setPrim('pre-prepared')">🧊 Pre</button>
                <button class="popt" id="po-s" onclick="setPrim('high-sodium')">🧂 Na+</button>
                <button class="popt" id="po-o" onclick="setPrim('other')">🍴 Free</button>
            </div>
        </div>
        <div class="fg">
            <label>Cuisine</label>
            <select id="m-cuisine">
                <option value="">— none —</option>
                <option>American</option><option>Asian</option><option>Italian</option><option>Mexican</option><option>Indian</option>
            </select>
        </div>
        <div class="fg">
            <label>Ingredients (Name:Amt:Aisle)</label>
            <div id="ing-list"></div>
            <button class="btn btn-s" style="margin-top:7px" onclick="addIng()">+ Add ingredient</button>
        </div>
        <div class="row2" style="margin-top:13px">
            <button class="btn btn-p" onclick="saveMeal()">Save</button>
            <button class="btn btn-d" id="del-btn" onclick="delMeal()">🗑</button>
        </div>
    </div>
</div>

<div class="ov h" id="ov-import">
    <div class="modal">
        <div class="modal-hnd"></div>
        <div class="mhdr"><h2>Import Meals</h2><button class="mcl" onclick="closeModal('ov-import')">×</button></div>
        <div class="guide">
            Format: <code>Name, Category, Cuisine, Ing1:Amt:Aisle; Ing2...</code>
        </div>
        <textarea id="import-txt" rows="7" placeholder="Meal,Category,Cuisine,Pasta:1lb:Pantry"></textarea>
        <div class="import-prev" id="import-prev"></div>
        <div class="row2">
            <button class="btn btn-s" onclick="prevImport()">Preview</button>
            <button class="btn btn-p" onclick="doImport()">Import</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
